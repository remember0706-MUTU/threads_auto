name: Threads BTC ICT 자동 포스팅

on:
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Playwright Chromium 설치
        run: playwright install chromium --with-deps

      - name: 세션 파일 복원
        run: echo "${{ secrets.THREADS_SESSION }}" | base64 -d > threads_session.json

      - name: 포스팅 실행
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python main.py test

      - name: 스크린샷 업로드 (디버깅)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshot_*.png
          retention-days: 1
